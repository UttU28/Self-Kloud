# Jellyfin — streaming.thatinsaneguy.com (HTTPS). Do not proxy to the Apeksha app.
# Apply when Let's Encrypt cert exists. 502 → check Jellyfin on 127.0.0.1:8096.

server {
    server_name streaming.thatinsaneguy.com;

    location / {
        proxy_pass http://127.0.0.1:8096;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/streaming.thatinsaneguy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/streaming.thatinsaneguy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = streaming.thatinsaneguy.com) {
        return 301 https://$host$request_uri;
    }

    server_name streaming.thatinsaneguy.com;
    listen 80;
    return 404;
}
