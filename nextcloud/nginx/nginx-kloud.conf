# Nextcloud — kloud.thatinsaneguy.com (HTTPS).
# 502 → check Nextcloud on 127.0.0.1:9270.

server {
    server_name kloud.thatinsaneguy.com;

    client_max_body_size 10G;
    fastcgi_buffers 64 4K;

    location /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }

    location /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }

    location / {
        proxy_pass http://127.0.0.1:9270;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kloud.thatinsaneguy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kloud.thatinsaneguy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = kloud.thatinsaneguy.com) {
        return 301 https://$host$request_uri;
    }

    server_name kloud.thatinsaneguy.com;
    listen 80;
    return 404;
}
