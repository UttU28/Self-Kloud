# Immich — photos.thatinsaneguy.com (HTTPS). 502 → check Immich on 127.0.0.1:2283.

server {
    server_name photos.thatinsaneguy.com;

    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:2283;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/photos.thatinsaneguy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photos.thatinsaneguy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = photos.thatinsaneguy.com) {
        return 301 https://$host$request_uri;
    }

    server_name photos.thatinsaneguy.com;
    listen 80;
    return 404;
}
